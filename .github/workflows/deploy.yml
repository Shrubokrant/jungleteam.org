name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload to server
        env:
          SSH_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          echo "$SSH_KEY_B64" | base64 -d > /tmp/key
          chmod 600 /tmp/key
          echo "Key size: $(wc -c < /tmp/key) bytes"
          ssh-keygen -l -f /tmp/key || echo "ssh-keygen check failed"
          scp -i /tmp/key -o StrictHostKeyChecking=no index.html root@204.168.245.80:/var/www/jungleteam/index.html
          scp -i /tmp/key -o StrictHostKeyChecking=no -r img/ root@204.168.245.80:/var/www/jungleteam/img/
          rm /tmp/key
